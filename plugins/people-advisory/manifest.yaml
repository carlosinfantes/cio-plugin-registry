# Context entity types specific to people domain
context_entities:
  - type: "organization"
    display_name: "Organization"
    description: "Company or business unit receiving advisory"
    attributes:
      - name: "headcount"
        type: "enum"
        enum_values: ["1-10", "11-50", "51-200", "201-500", "501-2000", "2000+"]
      - name: "stage"
        type: "enum"
        enum_values: ["startup", "growth", "mature", "enterprise"]
      - name: "work_model"
        type: "enum"
        enum_values: ["remote_first", "hybrid", "office_first", "distributed"]
      - name: "industry"
        type: "string"

  - type: "team"
    display_name: "Team"
    description: "Specific team or department under discussion"
    attributes:
      - name: "function"
        type: "enum"
        enum_values: ["engineering", "product", "design", "sales", "marketing", "operations", "finance", "hr", "legal", "executive"]
      - name: "size"
        type: "number"
      - name: "attrition_risk"
        type: "enum"
        enum_values: ["low", "moderate", "high", "critical"]

  - type: "role"
    display_name: "Role"
    description: "Job role being hired, redesigned, or evaluated"
    attributes:
      - name: "level"
        type: "enum"
        enum_values: ["ic_junior", "ic_mid", "ic_senior", "ic_staff", "ic_principal", "manager", "director", "vp", "c_level"]
      - name: "status"
        type: "enum"
        enum_values: ["open", "sourcing", "interviewing", "offer", "filled", "redesigning"]
      - name: "location_requirement"
        type: "enum"
        enum_values: ["onsite", "hybrid", "remote", "flexible"]

  - type: "people_initiative"
    display_name: "People Initiative"
    description: "HR program or organizational initiative"
    attributes:
      - name: "initiative_type"
        type: "enum"
        enum_values: ["reorg", "hiring_plan", "comp_review", "culture_program", "dei_initiative", "rif", "rto_policy", "career_framework"]
      - name: "status"
        type: "enum"
        enum_values: ["proposed", "planning", "in_progress", "completed"]
      - name: "impact_scope"
        type: "enum"
        enum_values: ["team", "department", "business_unit", "company_wide"]

# Decision domains for categorization
decision_domains:
  - people_strategy
  - organizational_design
  - talent_acquisition
  - total_rewards
  - dei
  - learning_development
  - employee_relations
  - performance_management
  - remote_hybrid
  - culture

# Custom prompts directory
prompts_dir: "prompts"
