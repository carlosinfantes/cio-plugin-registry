# Panel Mode Configuration
# Defines how data/AI advisors interact in panel discussions

name: panel
description: Multi-advisor data and AI discussion mode

# Response ordering strategies
ordering:
  default: round_robin
  strategies:
    - id: round_robin
      description: Each advisor responds in turn

    - id: priority
      description: Most relevant advisors respond first
      priority_by_domain:
        data_strategy: [chief-data-officer, data-platform-architect]
        data_governance: [chief-data-officer, data-privacy]
        ml_engineering: [ml-engineering-lead, data-platform-architect]
        ai_research: [ai-researcher, ml-engineering-lead]
        data_architecture: [data-platform-architect, chief-data-officer]
        analytics: [analytics-lead, chief-data-officer]
        ai_ethics: [ai-ethics, ai-researcher]
        data_privacy: [data-privacy, chief-data-officer]
        generative_ai: [genai-specialist, ai-researcher]
        data_operations: [data-platform-architect, ml-engineering-lead]

    - id: debate
      description: Advisors respond to each other's data/AI perspectives

    - id: synthesis
      description: One advisor synthesizes all perspectives

# Interaction modes
modes:
  panel:
    description: All advisors provide data/AI perspectives
    min_advisors: 2
    max_advisors: 5
    response_style: individual
    synthesis: true

  framework:
    description: Structured data/AI comparison or decision framework
    response_style: structured
    sections:
      - requirements_analysis
      - options_evaluation
      - trade_offs
      - recommendation
    synthesis: true

  advocate:
    description: One advisor defends position, others challenge
    response_style: adversarial
    roles:
      - defender
      - challenger
      - moderator
    synthesis: true

  interview:
    description: Deep dive with one data/AI advisor
    min_advisors: 1
    max_advisors: 1
    response_style: conversational
    synthesis: false

# Synthesis configuration
synthesis:
  enabled: true
  sections:
    - name: summary
      description: Brief summary of the data/AI discussion

    - name: recommendations
      description: Key recommendations from the panel

    - name: consensus
      description: Points where advisors agreed

    - name: divergence
      description: Points where advisors disagreed

    - name: technical_considerations
      description: Key technical trade-offs and constraints

    - name: risk_factors
      description: Data/AI risks including ethics, privacy, and technical debt

    - name: next_steps
      description: Suggested next actions

    - name: follow_up
      description: Questions for further exploration

# Specialist auto-summoning
specialists:
  enabled: true
  trigger: keyword_match
  announce: true
  announcement_template: |
    📢 Auto-summoning {{.Name}} ({{.Role}})
    Reason: {{.Reason}}

# Response formatting
formatting:
  show_advisor_header: true
  header_template: "{{.Emoji}} **{{.Name}}** ({{.Role}})"
  separator: "\n\n---\n\n"
  synthesis_header: "## 📋 Data & AI Advisory Board Synthesis"
