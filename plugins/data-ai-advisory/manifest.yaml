# Context entity types specific to data/AI domain
context_entities:
  - type: "data_asset"
    display_name: "Data Asset"
    description: "Dataset, table, or data product under discussion"
    attributes:
      - name: "asset_type"
        type: "enum"
        enum_values: ["table", "stream", "api", "file", "feature_store", "vector_store"]
      - name: "freshness"
        type: "enum"
        enum_values: ["real_time", "near_real_time", "hourly", "daily", "weekly", "static"]
      - name: "pii_level"
        type: "enum"
        enum_values: ["none", "pseudonymized", "contains_pii", "sensitive"]
      - name: "domain_owner"
        type: "string"

  - type: "model"
    display_name: "ML Model"
    description: "Machine learning model in development or production"
    attributes:
      - name: "model_type"
        type: "enum"
        enum_values: ["classification", "regression", "recommendation", "nlp", "vision", "generative", "reinforcement"]
      - name: "stage"
        type: "enum"
        enum_values: ["research", "experiment", "staging", "production", "deprecated"]
      - name: "serving_mode"
        type: "enum"
        enum_values: ["batch", "real_time", "streaming", "edge"]
      - name: "framework"
        type: "string"
        description: "e.g., PyTorch, TensorFlow, scikit-learn, LangChain"

  - type: "data_pipeline"
    display_name: "Data Pipeline"
    description: "ETL/ELT pipeline or data workflow"
    attributes:
      - name: "pipeline_type"
        type: "enum"
        enum_values: ["batch_etl", "streaming", "reverse_etl", "ml_training", "feature_pipeline"]
      - name: "orchestrator"
        type: "string"
        description: "e.g., Airflow, Dagster, Prefect, dbt"
      - name: "criticality"
        type: "enum"
        enum_values: ["low", "medium", "high", "business_critical"]

  - type: "ai_use_case"
    display_name: "AI Use Case"
    description: "Proposed or active AI/ML use case"
    attributes:
      - name: "use_case_type"
        type: "enum"
        enum_values: ["automation", "prediction", "recommendation", "generation", "classification", "extraction"]
      - name: "risk_tier"
        type: "enum"
        enum_values: ["minimal", "limited", "high", "unacceptable"]
        description: "EU AI Act risk classification"
      - name: "status"
        type: "enum"
        enum_values: ["proposed", "poc", "pilot", "production", "retired"]

# Decision domains for categorization
decision_domains:
  - data_strategy
  - data_governance
  - ml_engineering
  - ai_research
  - data_architecture
  - analytics
  - ai_ethics
  - data_privacy
  - generative_ai
  - data_operations

# Custom prompts directory
prompts_dir: "prompts"
