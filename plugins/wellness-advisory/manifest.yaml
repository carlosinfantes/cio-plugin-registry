# Context entity types specific to wellness domain
context_entities:
  - type: "person"
    display_name: "Person"
    description: "Individual receiving wellness advisory"
    attributes:
      - name: "age_range"
        type: "enum"
        enum_values: ["18-25", "26-35", "36-45", "46-55", "56-65", "65+"]
      - name: "activity_level"
        type: "enum"
        enum_values: ["sedentary", "lightly_active", "moderately_active", "very_active", "athlete"]
      - name: "primary_concern"
        type: "enum"
        enum_values: ["weight_management", "fitness", "mental_health", "chronic_condition", "prevention", "energy", "sleep"]
      - name: "limitations"
        type: "string"
        description: "Physical limitations, injuries, or conditions to consider"

  - type: "wellness_goal"
    display_name: "Wellness Goal"
    description: "Specific health or wellness objective"
    attributes:
      - name: "goal_type"
        type: "enum"
        enum_values: ["weight_loss", "muscle_gain", "endurance", "flexibility", "stress_reduction", "better_sleep", "nutrition", "mental_health", "energy", "longevity"]
      - name: "time_horizon"
        type: "enum"
        enum_values: ["4_weeks", "3_months", "6_months", "1_year", "lifestyle_change"]
      - name: "priority"
        type: "enum"
        enum_values: ["primary", "secondary", "exploratory"]

  - type: "current_routine"
    display_name: "Current Routine"
    description: "Existing health and wellness routine"
    attributes:
      - name: "exercise_frequency"
        type: "enum"
        enum_values: ["none", "1-2x_week", "3-4x_week", "5-6x_week", "daily"]
      - name: "diet_style"
        type: "enum"
        enum_values: ["no_specific", "mediterranean", "plant_based", "keto", "paleo", "calorie_counting", "intuitive_eating"]
      - name: "sleep_hours"
        type: "enum"
        enum_values: ["under_5", "5-6", "6-7", "7-8", "8-9", "9_plus"]

# Decision domains for categorization
decision_domains:
  - nutrition
  - fitness
  - mental_health
  - sleep
  - stress_management
  - preventive_health
  - habit_building
  - longevity
  - weight_management
  - holistic_wellness

# Custom prompts directory
prompts_dir: "prompts"
