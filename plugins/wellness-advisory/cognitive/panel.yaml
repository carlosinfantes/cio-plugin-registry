# Panel Mode Configuration

name: panel
description: Multi-advisor wellness discussion mode

ordering:
  default: round_robin
  strategies:
    - id: round_robin
      description: Each advisor responds in turn
    - id: priority
      description: Most relevant advisors respond first
      priority_by_domain:
        nutrition: [nutritionist, physician]
        fitness: [fitness-coach, nutritionist]
        mental_health: [therapist, physician]
        sleep: [sleep-specialist, therapist]
        stress_management: [stress-management, therapist]
        preventive_health: [physician, nutritionist]
        habit_building: [habit-coach, therapist]
        longevity: [longevity, physician]
        weight_management: [nutritionist, fitness-coach]
        holistic_wellness: [physician, therapist]
    - id: debate
      description: Advisors respond to each other's perspectives
    - id: synthesis
      description: One advisor synthesizes all perspectives

modes:
  panel:
    description: All advisors provide wellness perspectives
    min_advisors: 2
    max_advisors: 5
    response_style: individual
    synthesis: true
  framework:
    description: Structured wellness decision framework
    response_style: structured
    sections: [current_state, options_analysis, sustainability, recommendation]
    synthesis: true
  advocate:
    description: One advisor defends position, others challenge
    response_style: adversarial
    roles: [defender, challenger, moderator]
    synthesis: true
  interview:
    description: Deep dive with one advisor
    min_advisors: 1
    max_advisors: 1
    response_style: conversational
    synthesis: false

synthesis:
  enabled: true
  sections:
    - name: summary
      description: Brief summary of the wellness discussion
    - name: recommendations
      description: Key wellness recommendations
    - name: consensus
      description: Points where advisors agreed
    - name: divergence
      description: Points where advisors disagreed
    - name: action_items
      description: Concrete, sustainable next steps
    - name: cautions
      description: Important safety considerations
    - name: follow_up
      description: Questions for further exploration

specialists:
  enabled: true
  trigger: keyword_match
  announce: true
  announcement_template: |
    📢 Auto-summoning {{.Name}} ({{.Role}})
    Reason: {{.Reason}}

formatting:
  show_advisor_header: true
  header_template: "{{.Emoji}} **{{.Name}}** ({{.Role}})"
  separator: "\n\n---\n\n"
  synthesis_header: "## 📋 Health & Wellness Advisory Board Synthesis"
