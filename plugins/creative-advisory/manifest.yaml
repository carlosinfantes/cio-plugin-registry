# Context entity types specific to creative domain
context_entities:
  - type: "creator"
    display_name: "Creator"
    description: "Individual receiving creative advisory"
    attributes:
      - name: "creator_type"
        type: "enum"
        enum_values: ["writer", "visual_artist", "musician", "video_creator", "podcaster", "indie_maker", "content_creator", "multi_disciplinary"]
      - name: "experience_level"
        type: "enum"
        enum_values: ["beginner", "hobbyist", "intermediate", "professional", "veteran"]
      - name: "goal"
        type: "enum"
        enum_values: ["personal_expression", "audience_building", "monetization", "career_transition", "skill_development"]

  - type: "creative_project"
    display_name: "Creative Project"
    description: "Specific creative project under discussion"
    attributes:
      - name: "project_type"
        type: "enum"
        enum_values: ["book", "blog", "newsletter", "podcast", "youtube_channel", "course", "app", "art_series", "album", "film"]
      - name: "status"
        type: "enum"
        enum_values: ["idea", "planning", "in_progress", "editing", "launching", "growing", "stalled"]
      - name: "audience_size"
        type: "enum"
        enum_values: ["none_yet", "under_100", "100_1k", "1k_10k", "10k_100k", "100k_plus"]

  - type: "creative_block"
    display_name: "Creative Block"
    description: "Obstacle or challenge in the creative process"
    attributes:
      - name: "block_type"
        type: "enum"
        enum_values: ["writers_block", "perfectionism", "fear_of_judgment", "lack_of_direction", "burnout", "imposter_syndrome", "overwhelm", "technical_limitation"]
      - name: "duration"
        type: "enum"
        enum_values: ["days", "weeks", "months", "chronic"]

  - type: "platform"
    display_name: "Platform"
    description: "Content or distribution platform"
    attributes:
      - name: "platform_type"
        type: "enum"
        enum_values: ["youtube", "substack", "medium", "twitter", "linkedin", "tiktok", "instagram", "spotify", "personal_site", "product_hunt", "github"]
      - name: "presence_stage"
        type: "enum"
        enum_values: ["not_started", "building", "growing", "established"]

# Decision domains for categorization
decision_domains:
  - creative_direction
  - writing
  - content_creation
  - indie_building
  - visual_design
  - audio_production
  - video_creation
  - creative_business
  - audience_building
  - creative_process

# Custom prompts directory
prompts_dir: "prompts"
