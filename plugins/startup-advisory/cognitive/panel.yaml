# Panel Mode Configuration
# Defines how startup advisors interact in panel discussions

name: panel
description: Multi-advisor startup discussion mode

# Response ordering strategies
ordering:
  default: round_robin
  strategies:
    - id: round_robin
      description: Each advisor responds in turn

    - id: priority
      description: Most relevant advisors respond first
      priority_by_domain:
        fundraising: [vc-partner, serial-founder]
        product_market_fit: [growth-operator, serial-founder]
        go_to_market: [growth-operator, vc-partner]
        hiring: [serial-founder, startup-cto]
        technical_architecture: [startup-cto, serial-founder]
        pricing: [growth-operator, vc-partner]
        pivoting: [serial-founder, vc-partner]
        co_founder: [serial-founder, vc-partner]
        legal_formation: [serial-founder, vc-partner]
        growth_strategy: [growth-operator, vc-partner]

    - id: debate
      description: Advisors respond to each other's startup perspectives

    - id: synthesis
      description: One advisor synthesizes all perspectives

# Interaction modes
modes:
  panel:
    description: All advisors provide startup perspectives
    min_advisors: 2
    max_advisors: 5
    response_style: individual
    synthesis: true

  framework:
    description: Structured startup decision framework
    response_style: structured
    sections:
      - situation_assessment
      - options_analysis
      - risk_reward
      - recommendation
    synthesis: true

  advocate:
    description: One advisor defends position, others challenge
    response_style: adversarial
    roles:
      - defender
      - challenger
      - moderator
    synthesis: true

  interview:
    description: Deep dive with one advisor
    min_advisors: 1
    max_advisors: 1
    response_style: conversational
    synthesis: false

# Synthesis configuration
synthesis:
  enabled: true
  sections:
    - name: summary
      description: Brief summary of the startup discussion

    - name: recommendations
      description: Key recommendations from the advisory board

    - name: consensus
      description: Points where advisors agreed

    - name: divergence
      description: Points where advisors disagreed

    - name: risk_factors
      description: Key risks and how to mitigate them

    - name: next_steps
      description: Suggested next actions with priority

    - name: milestones
      description: Key milestones to hit before revisiting

    - name: follow_up
      description: Questions for further exploration

# Specialist auto-summoning
specialists:
  enabled: true
  trigger: keyword_match
  announce: true
  announcement_template: |
    📢 Auto-summoning {{.Name}} ({{.Role}})
    Reason: {{.Reason}}

# Response formatting
formatting:
  show_advisor_header: true
  header_template: "{{.Emoji}} **{{.Name}}** ({{.Role}})"
  separator: "\n\n---\n\n"
  synthesis_header: "## 📋 Startup Advisory Board Synthesis"
