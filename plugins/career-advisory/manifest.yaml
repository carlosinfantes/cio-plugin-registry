      - difficult conversations
      - feedback
      - promotion

# Context entity types specific to career domain
context_entities:
  - type: "professional"
    display_name: "Professional"
    description: "Individual receiving career advice"
    attributes:
      - name: "career_stage"
        type: "enum"
        enum_values: ["early_career", "mid_career", "senior", "executive", "career_changer", "re_entering"]
      - name: "industry"
        type: "string"
      - name: "current_role"
        type: "string"
      - name: "years_experience"
        type: "enum"
        enum_values: ["0-2", "3-5", "6-10", "11-15", "15+"]

  - type: "job_opportunity"
    display_name: "Job Opportunity"
    description: "Job or role being considered"
    attributes:
      - name: "opportunity_type"
        type: "enum"
        enum_values: ["new_job", "internal_transfer", "promotion", "freelance_gig", "startup", "return_to_work"]
      - name: "stage"
        type: "enum"
        enum_values: ["exploring", "applying", "interviewing", "offer", "negotiating", "deciding"]
      - name: "comp_range"
        type: "string"

  - type: "skill_gap"
    display_name: "Skill Gap"
    description: "Skill development area"
    attributes:
      - name: "skill_type"
        type: "enum"
        enum_values: ["technical", "leadership", "communication", "domain_expertise", "soft_skills"]
      - name: "urgency"
        type: "enum"
        enum_values: ["nice_to_have", "important", "critical_for_next_role"]
      - name: "development_path"
        type: "enum"
        enum_values: ["self_study", "course", "certification", "mentorship", "on_the_job", "coaching"]

# Decision domains for categorization
decision_domains:
  - career_strategy
  - job_search
  - negotiation
  - personal_brand
  - career_transitions
  - tech_career
  - freelancing
  - leadership
  - skill_development
  - networking

# Custom prompts directory
prompts_dir: "prompts"
