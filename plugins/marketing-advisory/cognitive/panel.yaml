# Panel Mode Configuration
# Defines how marketing advisors interact in panel discussions

name: panel
description: Multi-advisor marketing and brand discussion mode

# Response ordering strategies
ordering:
  default: round_robin
  strategies:
    - id: round_robin
      description: Each advisor responds in turn

    - id: priority
      description: Most relevant advisors respond first
      priority_by_domain:
        marketing_strategy: [cmo, demand-gen]
        demand_generation: [demand-gen, marketing-ops]
        brand_strategy: [brand-strategy, cmo]
        content: [content-strategy, brand-strategy]
        paid_media: [paid-acquisition, demand-gen]
        product_marketing: [product-marketing, cmo]
        community: [community-events, brand-strategy]
        marketing_operations: [marketing-ops, demand-gen]
        seo: [content-strategy, marketing-ops]
        analytics: [marketing-ops, demand-gen]

    - id: debate
      description: Advisors respond to each other's marketing perspectives

    - id: synthesis
      description: One advisor synthesizes all marketing perspectives

# Interaction modes
modes:
  panel:
    description: All advisors provide marketing perspectives
    min_advisors: 2
    max_advisors: 5
    response_style: individual
    synthesis: true

  framework:
    description: Structured marketing decision framework
    response_style: structured
    sections:
      - audience_assessment
      - channel_analysis
      - creative_strategy
      - recommendation
    synthesis: true

  advocate:
    description: One advisor defends marketing position, others challenge
    response_style: adversarial
    roles:
      - defender
      - challenger
      - moderator
    synthesis: true

  interview:
    description: Deep dive with one marketing advisor
    min_advisors: 1
    max_advisors: 1
    response_style: conversational
    synthesis: false

# Synthesis configuration
synthesis:
  enabled: true
  sections:
    - name: summary
      description: Brief summary of the marketing discussion

    - name: recommendations
      description: Key marketing recommendations from the panel

    - name: consensus
      description: Points where advisors agreed

    - name: divergence
      description: Points where advisors disagreed

    - name: audience_insight
      description: Key audience and market insights

    - name: channel_recommendations
      description: Channel strategy and budget allocation guidance

    - name: risk_factors
      description: Marketing risks and mitigation strategies

    - name: next_steps
      description: Suggested next actions with priority

    - name: follow_up
      description: Questions for further exploration

# Specialist auto-summoning
specialists:
  enabled: true
  trigger: keyword_match
  announce: true
  announcement_template: |
    📢 Auto-summoning {{.Name}} ({{.Role}})
    Reason: {{.Reason}}

# Response formatting
formatting:
  show_advisor_header: true
  header_template: "{{.Emoji}} **{{.Name}}** ({{.Role}})"
  separator: "\n\n---\n\n"
  synthesis_header: "## 📋 Marketing & Brand Advisory Board Synthesis"
