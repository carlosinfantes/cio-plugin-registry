# Context entity types specific to marketing domain
context_entities:
  - type: "campaign"
    display_name: "Campaign"
    description: "Marketing campaign under discussion"
    attributes:
      - name: "campaign_type"
        type: "enum"
        enum_values: ["brand_awareness", "demand_gen", "product_launch", "abm", "event", "content", "paid_media"]
      - name: "channel"
        type: "enum"
        enum_values: ["organic_search", "paid_search", "social_organic", "social_paid", "email", "events", "partnerships", "pr", "direct_mail"]
      - name: "status"
        type: "enum"
        enum_values: ["planning", "live", "paused", "completed", "analyzing"]
      - name: "budget"
        type: "string"

  - type: "audience"
    display_name: "Audience"
    description: "Target audience or persona"
    attributes:
      - name: "audience_type"
        type: "enum"
        enum_values: ["icp", "persona", "account_list", "lookalike", "retargeting"]
      - name: "buyer_role"
        type: "enum"
        enum_values: ["decision_maker", "influencer", "champion", "end_user", "economic_buyer"]
      - name: "segment_size"
        type: "string"

  - type: "channel"
    display_name: "Marketing Channel"
    description: "Marketing channel being evaluated or optimized"
    attributes:
      - name: "channel_type"
        type: "enum"
        enum_values: ["organic_search", "paid_search", "social_organic", "social_paid", "email", "events", "partnerships", "pr", "content", "community"]
      - name: "maturity"
        type: "enum"
        enum_values: ["testing", "scaling", "optimizing", "saturated"]
      - name: "estimated_cac"
        type: "string"

  - type: "brand_asset"
    display_name: "Brand Asset"
    description: "Brand element or asset under discussion"
    attributes:
      - name: "asset_type"
        type: "enum"
        enum_values: ["messaging", "visual_identity", "voice_tone", "positioning", "narrative", "tagline"]
      - name: "status"
        type: "enum"
        enum_values: ["draft", "review", "approved", "live", "needs_refresh"]

# Decision domains for categorization
decision_domains:
  - marketing_strategy
  - demand_generation
  - brand_strategy
  - content
  - paid_media
  - product_marketing
  - community
  - marketing_operations
  - seo
  - analytics

# Custom prompts directory
prompts_dir: "prompts"
