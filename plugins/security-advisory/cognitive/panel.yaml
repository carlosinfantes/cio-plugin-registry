# Panel Mode Configuration
# Defines how security advisors interact in panel discussions

name: panel
description: Multi-advisor security discussion mode

# Response ordering strategies
ordering:
  default: round_robin
  strategies:
    - id: round_robin
      description: Each advisor responds in turn

    - id: priority
      description: Most relevant advisors respond first
      priority_by_domain:
        security_strategy: [ciso, security-architect]
        application_security: [appsec-lead, security-architect]
        security_architecture: [security-architect, ciso]
        incident_response: [incident-commander, ciso]
        compliance_grc: [compliance-architect, ciso]
        cloud_security: [cloud-security, security-architect]
        threat_management: [threat-intel, incident-commander]
        identity_access: [security-architect, ciso]
        data_protection: [privacy-security, security-architect]
        security_operations: [incident-commander, security-architect]

    - id: debate
      description: Advisors respond to each other's security perspectives

    - id: synthesis
      description: One advisor synthesizes all security perspectives

# Interaction modes
modes:
  panel:
    description: All advisors provide security perspectives
    min_advisors: 2
    max_advisors: 5
    response_style: individual
    synthesis: true

  framework:
    description: Structured security assessment framework
    response_style: structured
    sections:
      - threat_assessment
      - control_analysis
      - risk_evaluation
      - recommendation
    synthesis: true

  advocate:
    description: Red team / blue team adversarial discussion
    response_style: adversarial
    roles:
      - defender
      - challenger
      - moderator
    synthesis: true

  interview:
    description: Deep dive with one security advisor
    min_advisors: 1
    max_advisors: 1
    response_style: conversational
    synthesis: false

# Synthesis configuration
synthesis:
  enabled: true
  sections:
    - name: summary
      description: Brief summary of the security discussion

    - name: recommendations
      description: Key security recommendations from the panel

    - name: consensus
      description: Points where advisors agreed

    - name: divergence
      description: Points where advisors disagreed

    - name: risk_assessment
      description: Risk ratings and potential business impact

    - name: quick_wins
      description: Immediate actions that reduce risk

    - name: next_steps
      description: Suggested next actions with priority

    - name: follow_up
      description: Questions for further security exploration

# Specialist auto-summoning
specialists:
  enabled: true
  trigger: keyword_match
  announce: true
  announcement_template: |
    📢 Auto-summoning {{.Name}} ({{.Role}})
    Reason: {{.Reason}}

# Response formatting
formatting:
  show_advisor_header: true
  header_template: "{{.Emoji}} **{{.Name}}** ({{.Role}})"
  separator: "\n\n---\n\n"
  synthesis_header: "## 📋 Security Advisory Board Synthesis"
