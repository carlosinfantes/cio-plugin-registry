# Context entity types specific to security domain
context_entities:
  - type: "threat"
    display_name: "Threat"
    description: "Identified threat or threat scenario"
    attributes:
      - name: "threat_type"
        type: "enum"
        enum_values: ["external_actor", "insider", "supply_chain", "ransomware", "phishing", "zero_day", "misconfiguration"]
      - name: "severity"
        type: "enum"
        enum_values: ["informational", "low", "medium", "high", "critical"]
      - name: "likelihood"
        type: "enum"
        enum_values: ["unlikely", "possible", "likely", "almost_certain"]
      - name: "mitre_tactic"
        type: "string"
        description: "MITRE ATT&CK tactic (e.g., initial_access, persistence)"

  - type: "asset"
    display_name: "Asset"
    description: "System, application, or data asset to protect"
    attributes:
      - name: "asset_type"
        type: "enum"
        enum_values: ["application", "infrastructure", "data", "network", "endpoint", "identity"]
      - name: "classification"
        type: "enum"
        enum_values: ["public", "internal", "confidential", "restricted"]
      - name: "environment"
        type: "enum"
        enum_values: ["production", "staging", "development", "corporate"]

  - type: "compliance_requirement"
    display_name: "Compliance Requirement"
    description: "Regulatory or framework compliance requirement"
    attributes:
      - name: "framework"
        type: "enum"
        enum_values: ["soc2", "iso27001", "fedramp", "hipaa", "pci_dss", "nist_csf", "cis", "gdpr"]
      - name: "control_status"
        type: "enum"
        enum_values: ["not_started", "in_progress", "implemented", "evidenced", "audited"]
      - name: "due_date"
        type: "string"

  - type: "incident"
    display_name: "Security Incident"
    description: "Active or past security incident"
    attributes:
      - name: "severity"
        type: "enum"
        enum_values: ["sev1", "sev2", "sev3", "sev4"]
      - name: "status"
        type: "enum"
        enum_values: ["detected", "triaged", "contained", "eradicated", "recovered", "closed"]
      - name: "incident_type"
        type: "enum"
        enum_values: ["data_breach", "ransomware", "phishing", "insider_threat", "ddos", "vulnerability_exploit", "misconfiguration"]

# Decision domains for categorization
decision_domains:
  - security_strategy
  - application_security
  - security_architecture
  - incident_response
  - compliance_grc
  - cloud_security
  - threat_management
  - identity_access
  - data_protection
  - security_operations

# Custom prompts directory
prompts_dir: "prompts"
