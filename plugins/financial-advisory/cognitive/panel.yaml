# Panel Mode Configuration
# Defines how financial advisors interact in panel discussions

name: panel
description: Multi-advisor financial discussion mode

# Response ordering strategies
ordering:
  default: round_robin
  strategies:
    - id: round_robin
      description: Each advisor responds in turn

    - id: priority
      description: Most relevant advisors respond first
      priority_by_domain:
        capital_allocation: [cfo, treasury]
        financial_planning: [fp-and-a, cfo]
        treasury: [treasury, cfo]
        tax_strategy: [tax-strategy, controller]
        investor_relations: [investor-relations, cfo]
        mergers_acquisitions: [ma-strategy, cfo]
        procurement: [procurement, fp-and-a]
        accounting: [controller, fp-and-a]
        compliance: [controller, cfo]
        pricing: [fp-and-a, cfo]

    - id: debate
      description: Advisors respond to each other's financial perspectives

    - id: synthesis
      description: One advisor synthesizes all financial perspectives

# Interaction modes
modes:
  panel:
    description: All advisors provide financial perspectives
    min_advisors: 2
    max_advisors: 5
    response_style: individual
    synthesis: true

  framework:
    description: Structured financial comparison/decision framework
    response_style: structured
    sections:
      - criteria_definition
      - financial_analysis
      - risk_assessment
      - recommendation
    synthesis: true

  advocate:
    description: One advisor defends financial position, others challenge
    response_style: adversarial
    roles:
      - defender
      - challenger
      - moderator
    synthesis: true

  interview:
    description: Deep dive with one financial advisor
    min_advisors: 1
    max_advisors: 1
    response_style: conversational
    synthesis: false

# Synthesis configuration
synthesis:
  enabled: true
  sections:
    - name: summary
      description: Brief summary of the financial discussion

    - name: recommendations
      description: Key financial recommendations from the panel

    - name: consensus
      description: Points where advisors agreed

    - name: divergence
      description: Points where advisors disagreed

    - name: financial_impact
      description: Estimated financial impact and key metrics

    - name: risk_factors
      description: Financial risks and mitigation strategies

    - name: next_steps
      description: Suggested next actions

    - name: follow_up
      description: Questions for further financial exploration

# Specialist auto-summoning
specialists:
  enabled: true
  trigger: keyword_match
  announce: true
  announcement_template: |
    📢 Auto-summoning {{.Name}} ({{.Role}})
    Reason: {{.Reason}}

# Response formatting
formatting:
  show_advisor_header: true
  header_template: "{{.Emoji}} **{{.Name}}** ({{.Role}})"
  separator: "\n\n---\n\n"
  synthesis_header: "## 📋 Financial Advisory Board Synthesis"
