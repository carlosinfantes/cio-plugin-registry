      - user research
      - usability
      - interview
      - survey
      - user testing
      - persona
      - journey map
      - ux
      - accessibility

  analytics:
    advisor: product-analytics
    patterns:
      - metrics
      - analytics
      - a/b test
      - experiment
      - data
      - cohort
      - north star
      - kpi

  pricing:
    advisor: pricing-strategy
    patterns:
      - pricing
      - monetization
      - freemium
      - tier
      - plan
      - paywall
      - arpu
      - usage based

  platform:
    advisor: platform-product
    patterns:
      - platform
      - api
      - developer
      - sdk
      - integration
      - marketplace
      - ecosystem

  competitive:
    advisor: competitive-intel
    patterns:
      - competitor
      - competitive
      - market
      - differentiation
      - positioning
      - battlecard
      - category

  mobile:
    advisor: mobile-product
