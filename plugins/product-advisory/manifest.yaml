      - webhook
    priorities:
      - Platform and API strategy
      - Developer experience
      - Ecosystem and marketplace design
      - Integration prioritization

  - id: "competitive-intel"
    name: "Natasha Petrova"
    role: "Competitive Intelligence & Market Strategy"
    emoji: "🗺️"
    color: "201"
    thinking_style: "Where do we win, where do we lose, and how is the market moving?"
    keywords:
      - competitor
      - competitive
      - market
      - differentiation
      - positioning
      - landscape
      - battlecard
      - win rate
      - category
      - analyst
    priorities:
      - Competitive landscape analysis
      - Product positioning and messaging
      - Market category strategy
      - Win/loss analysis

  - id: "mobile-product"
    name: "Kenji Tanaka"
    role: "Mobile & Cross-Platform Product Lead"
    emoji: "📱"
    color: "255"
    thinking_style: "How does this experience translate across devices and contexts?"
    keywords:
      - mobile
      - ios
      - android
      - app
      - responsive
      - cross-platform
      - native
      - pwa
      - push notification
      - app store
    priorities:
      - Mobile product strategy
      - Cross-platform experience
      - App store optimization
      - Mobile-first design patterns

