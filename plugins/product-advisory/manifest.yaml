# Context entity types specific to product domain
context_entities:
  - type: "product"
    display_name: "Product"
    description: "Product or product line under discussion"
    attributes:
      - name: "product_type"
        type: "enum"
        enum_values: ["saas", "marketplace", "platform", "mobile_app", "api", "hardware", "consumer"]
      - name: "stage"
        type: "enum"
        enum_values: ["concept", "mvp", "growth", "mature", "sunset"]
      - name: "business_model"
        type: "enum"
        enum_values: ["subscription", "usage_based", "freemium", "marketplace_fee", "one_time", "advertising"]
      - name: "target_market"
        type: "enum"
        enum_values: ["smb", "mid_market", "enterprise", "consumer", "prosumer"]

  - type: "feature"
    display_name: "Feature"
    description: "Feature being evaluated, designed, or prioritized"
    attributes:
      - name: "status"
        type: "enum"
        enum_values: ["idea", "discovery", "design", "development", "beta", "ga", "deprecated"]
      - name: "priority"
        type: "enum"
        enum_values: ["p0_critical", "p1_high", "p2_medium", "p3_low"]
      - name: "impact_estimate"
        type: "enum"
        enum_values: ["low", "medium", "high", "transformational"]

  - type: "experiment"
    display_name: "Experiment"
    description: "A/B test or product experiment"
    attributes:
      - name: "experiment_type"
        type: "enum"
        enum_values: ["a_b_test", "multivariate", "holdout", "qualitative", "prototype"]
      - name: "status"
        type: "enum"
        enum_values: ["designing", "running", "analyzing", "decided"]
      - name: "primary_metric"
        type: "string"

  - type: "user_segment"
    display_name: "User Segment"
    description: "Target user or customer segment"
    attributes:
      - name: "segment_type"
        type: "enum"
        enum_values: ["persona", "cohort", "behavioral", "firmographic", "lifecycle_stage"]
      - name: "size"
        type: "string"
        description: "Approximate segment size"
      - name: "value"
        type: "enum"
        enum_values: ["low", "medium", "high", "strategic"]

# Decision domains for categorization
decision_domains:
  - product_strategy
  - growth
  - user_research
  - product_analytics
  - pricing
  - platform
  - competitive_strategy
  - mobile
  - experimentation
  - roadmap

# Custom prompts directory
prompts_dir: "prompts"
