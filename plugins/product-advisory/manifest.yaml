      - monetization
      - free tier
      - freemium
      - paywall
      - plan
      - tier
      - enterprise pricing
      - seat
      - usage based
      - arpu
      - arpa
    priorities:
      - Pricing model design
      - Packaging and tiering
      - Monetization strategy
      - Willingness-to-pay research

  - id: "platform-product"
    name: "Diego Alvarez"
    role: "Platform & API Product Manager"
    emoji: "🔌"
    color: "51"
    thinking_style: "How do we turn our product into a platform others build on?"
    keywords:
