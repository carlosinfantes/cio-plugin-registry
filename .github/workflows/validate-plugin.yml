name: Validate Plugin PR

on:
  pull_request:
    paths:
      - 'plugins/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Detect changed plugins
        id: changes
        run: |
          plugins=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} \
            | grep '^plugins/' \
            | cut -d/ -f1-2 \
            | sort -u)
          echo "plugins=$plugins" >> "$GITHUB_OUTPUT"
          echo "Changed plugin directories:"
          echo "$plugins"

      - name: Validate changed plugins
        run: |
          changed="${{ steps.changes.outputs.plugins }}"
          if [ -z "$changed" ]; then
            echo "No plugin directories changed."
            exit 0
          fi
          for dir in $changed; do
            echo "Validating $dir..."
            ./scripts/validate-plugin.sh "$dir"
          done

      - name: Validate all plugins (full check)
        run: ./scripts/validate-plugin.sh --all
